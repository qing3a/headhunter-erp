# .github/release-drafter.yml
# 自动从 PR title + label 生成 release notes
# 文档: https://github.com/release-drafter/release-drafter

name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
version-resolver:
  major:
    labels: ['breaking']
  minor:
    labels: ['feature', 'enhancement']
  default: patch

categories:
  - title: '🚨 Breaking Changes'
    labels: ['breaking']
  - title: '🚀 New Features'
    labels: ['feature', 'enhancement']
  - title: '🐛 Bug Fixes'
    labels: ['bug', 'fix']
  - title: '📝 Documentation'
    labels: ['docs', 'documentation']
  - title: '🧪 Tests'
    labels: ['test', 'tests']
  - title: '🔧 Maintenance'
    labels: ['chore', 'refactor', 'ci', 'perf']

change-template: '- $TITLE (#$NUMBER) @$AUTHOR'

template: |
  ## Changes

  $CHANGES

  ## Contributors

  $CONTRIBUTORS

  ---

  🤖 This release note is auto-generated by [release-drafter](https://github.com/release-drafter/release-drafter).
