<!-- ==================== LEFT SIDEBAR ==================== -->
<aside class="shell-sidebar" data-dom-id="sidebar">
  <div class="flex items-center gap-2.5 px-5 h-14 flex-shrink-0">
    <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background-color: rgba(94, 234, 212, 0.2);">
      <svg class="w-5 h-5" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 2L12.5 7.5L18 10L12.5 12.5L10 18L7.5 12.5L2 10L7.5 7.5L10 2Z" fill="#5EEAD4"/>
      </svg>
    </div>
    <span class="text-white font-semibold text-base tracking-tight" style="font-family: var(--font-family);">TalentFlow AI</span>
  </div>

  <nav class="flex flex-col flex-1 mt-4" data-dom-id="nav-list">
    <!-- 菜单项由 shared/menu-config.js + shared/layout.js#renderSidebarMenu 渲染 -->
  </nav>

  <div class="flex-shrink-0 border-t border-white/10 px-3 py-3" data-dom-id="sidebar-system">
    <!-- system 菜单由 shared/layout.js#renderSidebarMenu 渲染（不依赖占位） -->
    <div class="flex items-center gap-3 px-4 mt-2 py-2">
      <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-semibold text-white" style="background-color: rgba(94, 234, 212, 0.25);">
        A
      </div>
      <div class="flex flex-col min-w-0">
        <span class="text-white text-sm font-medium truncate" style="font-family: var(--font-family);" data-dom-id="sidebar-user-name">Admin</span>
        <span class="text-white/50 text-xs" style="font-family: var(--font-family);" data-dom-id="sidebar-user-role">管理员</span>
      </div>
    </div>
  </div>
</aside>

<!-- ==================== TOP HEADER ==================== -->
<header class="shell-header" data-dom-id="top-header">
  <div data-dom-id="header-title">
    <h1 class="text-base font-semibold" style="color: var(--color-text-primary); font-family: var(--font-family);">
      <span data-slot="pageTitle"></span>
    </h1>
  </div>

  <div class="flex items-center gap-3">
    <div class="relative">
      <input
        type="text"
        placeholder="搜索候选人、职位..."
        class="h-8 w-56 pl-8 pr-3 text-sm rounded-lg border bg-transparent outline-none transition-colors focus:border-[var(--color-primary-light)]"
        style="border-color: var(--color-border, #E2E8F0); color: var(--color-text-primary, #0F172A); font-family: var(--font-family);"
        data-dom-id="header-search"
      />
      <i data-lucide="search" class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5" style="color: var(--color-text-tertiary, #94A3B8);"></i>
    </div>

    <button class="theme-toggle" id="themeToggle" title="切换主题">
      <i data-lucide="sun" class="icon-sun"></i>
      <i data-lucide="moon" class="icon-moon"></i>
    </button>

    <div class="dropdown">
      <button class="relative w-8 h-8 rounded-lg flex items-center justify-center transition-colors hover:bg-[var(--color-bg-tertiary, #F1F5F9)]" data-dropdown-toggle="notificationDropdown">
        <i data-lucide="bell" class="w-[18px] h-[18px]" style="color: var(--color-text-secondary, #475569);"></i>
        <span class="absolute top-1.5 right-1.5 w-2 h-2 rounded-full" style="background-color: var(--state-error, #EF4444);"></span>
      </button>
      <div class="dropdown-menu notification-dropdown" id="notificationDropdown">
        <div class="notification-header">
          <h4>通知</h4>
          <button class="notification-mark-all">全部已读</button>
        </div>
        <div class="notification-list">
          <div class="notification-item unread">
            <div class="notification-avatar">张</div>
            <div class="notification-content">
              <div class="notification-text">张三 更新了简历状态</div>
              <div class="notification-time">5 分钟前</div>
            </div>
          </div>
          <div class="notification-item unread">
            <div class="notification-avatar">面</div>
            <div class="notification-content">
              <div class="notification-text">明天 10:00 有一场面试</div>
              <div class="notification-time">1 小时前</div>
            </div>
          </div>
          <div class="notification-item">
            <div class="notification-avatar">系</div>
            <div class="notification-content">
              <div class="notification-text">系统更新完成，新增 AI 匹配功能</div>
              <div class="notification-time">昨天</div>
            </div>
          </div>
        </div>
        <div class="notification-footer">
          <a href="notifications.html">查看全部通知</a>
        </div>
      </div>
    </div>

    <div class="dropdown">
      <button class="flex items-center gap-2 h-8 px-2 rounded-lg transition-colors hover:bg-[var(--color-bg-tertiary, #F1F5F9)]" data-dropdown-toggle="userDropdown">
        <div class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-semibold" style="background-color: var(--color-primary); color: white;">
          A
        </div>
        <span class="text-sm font-medium" style="color: var(--color-text-secondary, #475569); font-family: var(--font-family);" data-dom-id="header-user-name">
          Admin
        </span>
        <i data-lucide="chevron-down" class="w-3 h-3" style="color: var(--color-text-tertiary);"></i>
      </button>
      <div class="dropdown-menu" id="userDropdown" style="min-width: 200px;">
        <div style="padding: 12px 16px; border-bottom: 1px solid var(--color-border); margin-bottom: 6px;">
          <div style="font-size: 13px; font-weight: 600; color: var(--color-text-primary); margin-bottom: 2px;">Admin</div>
          <div style="font-size: 12px; color: var(--color-text-tertiary);">admin@talentflow.ai</div>
        </div>
        <a href="settings.html" class="dropdown-item">
          <i data-lucide="user" class="dropdown-icon"></i>
          个人资料
        </a>
        <a href="settings.html" class="dropdown-item">
          <i data-lucide="briefcase" class="dropdown-icon"></i>
          账户设置
        </a>
        <a href="settings.html" class="dropdown-item">
          <i data-lucide="users" class="dropdown-icon"></i>
          我的团队
        </a>
        <div class="dropdown-divider"></div>
        <a href="login.html" class="dropdown-item danger">
          <i data-lucide="log-out" class="dropdown-icon"></i>
          退出登录
        </a>
      </div>
    </div>
  </div>
</header>

<!-- ==================== MAIN CONTENT AREA ==================== -->
<main class="shell-main" data-dom-id="main-content">
  <div class="content-wrapper" style="max-width: 1200px;">
    <div data-slot="pageContent"></div>
  </div>
</main>
