<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 智能匹配</title>
  <link rel="stylesheet" href="../shared/shared.css">
  <script src="../shared/auth.js"></script>
  <script src="../shared/loading.js"></script>
  <script src="../shared/router.js"></script>
  <script src="../shared/api.js"></script>
  <style id="pageStyle">
    .match-toolbar { background: var(--color-bg-surface, #fff); border: 1px solid var(--color-border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
    .match-toolbar .form-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
    .match-toolbar .form-group { flex: 1; min-width: 200px; }
    .weight-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px 24px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--color-border-light); }
    .weight-item { display: flex; flex-direction: column; gap: 4px; }
    .weight-item label { font-size: 12px; color: var(--color-text-secondary); display: flex; justify-content: space-between; }
    .match-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
    .match-card { background: var(--color-bg-surface, #fff); border: 1px solid var(--color-border); border-radius: 8px; padding: 16px; }
    .match-card .name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .match-card .position { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 8px; }
    .match-card .score { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .match-card .score-num { font-size: 24px; font-weight: 600; color: var(--color-primary); }
    .match-card .score-bar { flex: 1; height: 6px; background: var(--color-bg-page-secondary, #f3f4f6); border-radius: 3px; overflow: hidden; }
    .match-card .score-bar-fill { height: 100%; background: var(--color-primary); }
    .match-card .reasons { font-size: 12px; color: var(--color-text-secondary); line-height: 1.6; }
    .match-card .actions { display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--color-border-light); }
    .match-card .actions button { flex: 1; padding: 6px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .match-card .actions .btn-recommend { background: var(--color-primary); color: #fff; border: none; }
    .match-card .actions .btn-view { background: none; border: 1px solid var(--color-border); color: var(--color-text-secondary); }
  </style>
</head>
<body>
  <div id="pageContent">
    <div class="match-toolbar">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">选择职位</label>
          <select class="form-select" id="jobSelect"><option value="">加载中...</option></select>
        </div>
        <div class="form-group" style="flex: 0 0 auto;">
          <button class="btn btn-primary" id="matchBtn">开始匹配</button>
        </div>
      </div>

      <div class="weight-grid">
        <div class="weight-item"><label>行业 <span id="wIndustryVal">25%</span></label><input type="range" min="0" max="100" value="25" id="wIndustry"></div>
        <div class="weight-item"><label>职位 <span id="wPositionVal">25%</span></label><input type="range" min="0" max="100" value="25" id="wPosition"></div>
        <div class="weight-item"><label>地点 <span id="wCityVal">15%</span></label><input type="range" min="0" max="100" value="15" id="wCity"></div>
        <div class="weight-item"><label>薪资 <span id="wSalaryVal">15%</span></label><input type="range" min="0" max="100" value="15" id="wSalary"></div>
        <div class="weight-item"><label>经验 <span id="wExperienceVal">10%</span></label><input type="range" min="0" max="100" value="10" id="wExperience"></div>
        <div class="weight-item"><label>学历 <span id="wEducationVal">10%</span></label><input type="range" min="0" max="100" value="10" id="wEducation"></div>
      </div>
    </div>

    <div id="resultHint" style="padding:40px;text-align:center;color:var(--color-text-secondary);">选择职位后点击"开始匹配"</div>
    <div class="match-grid" id="matchGrid" style="display:none;"></div>
  </div>

  <script type="module" src="./ai-matching.js"></script>
  <script src="../shared/shared.js"></script>
  <script src="../shared/layout.js"></script>
</body>
</html>
