<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>职位详情 - TalentFlow AI</title>
  <link rel="stylesheet" href="../shared/shared.css">
  <script src="../shared/auth.js"></script>
  <script src="../shared/loading.js"></script>
  <script src="../shared/router.js"></script>
  <script src="../shared/api.js"></script>
  <style id="pageStyle">
    .job-detail-container { max-width: 960px; margin: 0 auto; }
    .job-header { background: var(--color-bg-surface, #fff); border: 1px solid var(--color-border); border-radius: 8px; padding: 24px; margin-bottom: 16px; }
    .job-header h1 { margin: 0 0 8px 0; font-size: 22px; font-weight: 600; }
    .job-header .meta { color: var(--color-text-secondary); font-size: 14px; margin-bottom: 12px; }
    .job-header .actions { display: flex; gap: 8px; }
    .job-header .status-pill { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
    .job-header .status-pill.open { background: #d1fae5; color: #065f46; }
    .job-header .status-pill.closed { background: #f3f4f6; color: #4b5563; }
    .job-header .status-pill.on_hold { background: #fef3c7; color: #92400e; }

    .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px 24px; }
    .info-grid .item .label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
    .info-grid .item .value { font-size: 14px; }

    .section { background: var(--color-bg-surface, #fff); border: 1px solid var(--color-border); border-radius: 8px; padding: 24px; margin-bottom: 16px; }
    .section h3 { margin: 0 0 16px 0; font-size: 15px; font-weight: 600; }

    .rec-list { display: flex; flex-direction: column; gap: 8px; }
    .rec-item { display: flex; align-items: center; gap: 12px; padding: 12px; border: 1px solid var(--color-border-light); border-radius: 6px; }
    .rec-item .info { flex: 1; }
    .rec-item .name { font-weight: 500; }
    .rec-item .meta { font-size: 12px; color: var(--color-text-secondary); }

    .desc-content { white-space: pre-wrap; line-height: 1.7; color: var(--color-text-primary); font-size: 14px; }
  </style>
</head>
<body>
  <div id="pageContent">
    <div class="job-detail-container">
      <div id="loadingHint" style="padding:60px;text-align:center;color:var(--color-text-secondary);">加载中...</div>

      <div id="detailContainer" style="display:none;">
        <!-- 头部 -->
        <div class="job-header">
          <h1 id="jobTitle">--</h1>
          <div class="meta" id="jobMeta">--</div>
          <div class="actions">
            <span class="status-pill" id="jobStatus">--</span>
            <button class="btn btn-primary" id="editBtn">编辑</button>
            <button class="btn btn-secondary" id="toggleStatusBtn">--</button>
            <button class="btn btn-secondary" id="deleteBtn" style="color:#dc2626;">删除</button>
            <button class="btn btn-secondary" id="backBtn">返回列表</button>
          </div>
        </div>

        <!-- 基本信息 -->
        <div class="section">
          <h3>基本信息</h3>
          <div class="info-grid" id="basicInfo"></div>
        </div>

        <!-- 描述 -->
        <div class="section" id="descSection" style="display:none;">
          <h3>职位描述</h3>
          <div class="desc-content" id="descContent"></div>
        </div>

        <!-- 推荐列表 -->
        <div class="section">
          <h3>推荐记录 <span id="recCount" style="color:var(--color-text-secondary);font-weight:normal;font-size:13px;"></span></h3>
          <div class="rec-list" id="recList"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./job-detail.js"></script>
  <script src="../shared/shared.js"></script>
  <script src="../shared/layout.js"></script>
</body>
</html>
