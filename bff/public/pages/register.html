<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - TalentFlow AI</title>
  <link rel="stylesheet" href="../shared/shared.css">
  <style>
    body {
      margin: 0;
      font-family: var(--font-family);
      background-color: var(--color-bg-secondary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .auth-container {
      display: flex;
      width: 100%;
      max-width: 960px;
      background-color: var(--color-bg, #FFFFFF);
      border-radius: 16px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      min-height: 560px;
    }

    .auth-brand {
      flex: 1;
      background-color: var(--color-primary);
      padding: 48px 40px;
      color: #FFFFFF;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .auth-brand::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      top: -100px;
      right: -100px;
    }

    .auth-brand::after {
      content: '';
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      bottom: -60px;
      left: -40px;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      position: relative;
      z-index: 1;
    }

    .brand-logo-icon {
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-logo-text {
      font-size: 22px;
      font-weight: var(--font-weight-bold, 700);
      color: #FFFFFF;
    }

    .auth-brand h1 {
      font-size: 28px;
      font-weight: var(--font-weight-bold, 700);
      margin: 0 0 16px;
      line-height: 1.3;
      position: relative;
      z-index: 1;
    }

    .auth-brand p {
      font-size: var(--font-size-base, 14px);
      line-height: 1.6;
      opacity: 0.85;
      margin: 0;
      position: relative;
      z-index: 1;
    }

    .brand-stats {
      margin-top: 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      position: relative;
      z-index: 1;
    }

    .brand-stat-item {
      text-align: center;
    }

    .brand-stat-number {
      font-size: 28px;
      font-weight: var(--font-weight-bold, 700);
      margin-bottom: 4px;
    }

    .brand-stat-label {
      font-size: var(--font-size-xs, 12px);
      opacity: 0.75;
    }

    .auth-form-container {
      flex: 1;
      padding: 40px 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow-y: auto;
      max-height: 90vh;
    }

    .auth-form-header {
      margin-bottom: 24px;
    }

    .auth-form-header h2 {
      font-size: 24px;
      font-weight: var(--font-weight-bold, 700);
      color: var(--color-text-primary, #0F172A);
      margin: 0 0 8px;
    }

    .auth-form-header p {
      font-size: var(--font-size-base, 14px);
      color: var(--color-text-secondary, #475569);
      margin: 0;
    }

    .form-row {
      display: flex;
      gap: 12px;
    }

    .form-row .form-group {
      flex: 1;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: var(--font-size-sm, 13px);
      font-weight: var(--font-weight-medium, 500);
      color: var(--color-text-primary, #0F172A);
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 10px 12px;
      font-size: var(--font-size-sm, 13px);
      font-family: var(--font-family);
      color: var(--color-text-primary, #0F172A);
      background-color: var(--color-bg, #FFFFFF);
      border: 1px solid var(--color-border, #E2E8F0);
      border-radius: var(--radius-md, 8px);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      box-sizing: border-box;
    }

    .form-input:focus {
      border-color: var(--color-primary-light, #14B8A6);
      box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.1);
    }

    .form-input::placeholder {
      color: var(--color-text-tertiary, #94A3B8);
    }

    .form-select {
      width: 100%;
      padding: 10px 12px;
      font-size: var(--font-size-sm, 13px);
      font-family: var(--font-family);
      color: var(--color-text-primary, #0F172A);
      background-color: var(--color-bg, #FFFFFF);
      border: 1px solid var(--color-border, #E2E8F0);
      border-radius: var(--radius-md, 8px);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      box-sizing: border-box;
    }

    .form-select:focus {
      border-color: var(--color-primary-light, #14B8A6);
      box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.1);
    }

    .btn-submit {
      width: 100%;
      padding: 12px;
      font-size: var(--font-size-base, 14px);
      font-weight: var(--font-weight-semibold, 600);
      font-family: var(--font-family);
      color: var(--color-text-on-primary, #FFFFFF);
      background-color: var(--color-primary, #0D9488);
      border: none;
      border-radius: var(--radius-md, 8px);
      cursor: pointer;
      transition: background-color 0.15s ease;
      margin-top: 8px;
    }

    .btn-submit:hover {
      background-color: var(--color-primary-dark, #0F766E);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .form-error {
      color: var(--state-error, #EF4444);
      font-size: var(--font-size-sm, 13px);
      margin-top: 12px;
      min-height: 18px;
    }

    .notice-box {
      padding: 20px;
      background: var(--color-bg-secondary, #F8FAFC);
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .notice-box p {
      margin: 0;
      font-size: var(--font-size-sm, 13px);
      color: var(--color-text-secondary, #475569);
      line-height: 1.6;
    }

    .auth-footer {
      text-align: center;
      font-size: var(--font-size-sm, 13px);
      color: var(--color-text-secondary, #475569);
      margin-top: 24px;
    }

    .auth-footer a {
      color: var(--color-primary, #0D9488);
      text-decoration: none;
      font-weight: var(--font-weight-medium, 500);
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .auth-container {
        flex-direction: column;
      }
      .auth-brand {
        padding: 32px 24px;
      }
      .auth-form-container {
        padding: 32px 24px;
      }
      .form-row {
        flex-direction: column;
        gap: 0;
      }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-brand">
      <div class="brand-logo">
        <div class="brand-logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div class="brand-logo-text">TalentFlow AI</div>
      </div>
      <h1>开启智能招聘之旅</h1>
      <p>加入数百家猎头公司，体验 AI 驱动的高效招聘</p>
      <div class="brand-stats">
        <div class="brand-stat-item">
          <div class="brand-stat-number">500+</div>
          <div class="brand-stat-label">企业客户</div>
        </div>
        <div class="brand-stat-item">
          <div class="brand-stat-number">50万+</div>
          <div class="brand-stat-label">候选人库</div>
        </div>
        <div class="brand-stat-item">
          <div class="brand-stat-number">98%</div>
          <div class="brand-stat-label">匹配准确率</div>
        </div>
        <div class="brand-stat-item">
          <div class="brand-stat-number">3倍</div>
          <div class="brand-stat-label">效率提升</div>
        </div>
      </div>
    </div>
    <div class="auth-form-container">
      <div class="auth-form-header">
        <h2>创建账户</h2>
        <p>填写以下信息完成注册</p>
      </div>

      <div id="adminOnlyNotice" style="display: none;">
        <div class="notice-box">
          <p>仅管理员可以创建新账号。请使用管理员账号登录后再为成员开通账号。</p>
        </div>
        <a href="login.html" class="btn-submit" style="display: block; text-align: center; text-decoration: none;">返回登录</a>
      </div>

      <form id="registerForm" style="display: none;">
        <div class="form-group">
          <label class="form-label" for="username">用户名</label>
          <input type="text" id="username" name="username" class="form-input" placeholder="请输入用户名" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="displayName">显示名</label>
            <input type="text" id="displayName" name="displayName" class="form-input" placeholder="请输入显示名" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="role">角色</label>
            <select id="role" name="role" class="form-select">
              <option value="consultant">顾问</option>
              <option value="admin">管理员</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">密码</label>
          <input type="password" id="password" name="password" class="form-input" placeholder="至少 6 位" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPassword">确认密码</label>
          <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" placeholder="请再次输入密码" required>
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">创建账户</button>
        <div class="form-error" id="formError"></div>
      </form>

      <div class="auth-footer">
        已有账户？<a href="login.html">立即登录</a>
      </div>
    </div>
  </div>

  <script src="../shared/auth.js"></script>
  <script src="../shared/menu-config.js"></script>
  <script src="../shared/loading.js"></script>
  <script src="../shared/router.js"></script>
  <script src="../shared/api.js"></script>
  <script>
    (function() {
      var noticeEl = document.getElementById('adminOnlyNotice');
      var formEl = document.getElementById('registerForm');
      var errorEl = document.getElementById('formError');
      var submitBtn = document.getElementById('submitBtn');

      var loggedIn = window.Auth && window.Auth.isLoggedIn();
      var isAdmin = loggedIn && window.Auth.isAdmin();

      if (loggedIn && isAdmin) {
        formEl.style.display = '';
      } else {
        noticeEl.style.display = '';
      }

      function showError(msg) {
        errorEl.textContent = msg || '';
      }

      if (formEl.addEventListener) {
        formEl.addEventListener('submit', function(e) {
          e.preventDefault();
          showError('');

          var username = document.getElementById('username').value.trim();
          var displayName = document.getElementById('displayName').value.trim();
          var role = document.getElementById('role').value;
          var password = document.getElementById('password').value;
          var confirmPassword = document.getElementById('confirmPassword').value;

          if (!username) { showError('请输入用户名'); return; }
          if (!displayName) { showError('请输入显示名'); return; }
          if (!password || password.length < 6) { showError('密码至少 6 位'); return; }
          if (password !== confirmPassword) { showError('两次输入的密码不一致'); return; }

          submitBtn.disabled = true;
          var original = submitBtn.textContent;
          submitBtn.textContent = '创建中...';

          var payload = { username: username, password: password, displayName: displayName, role: role };
          window.API.auth.register(username, password, displayName, role).then(function(res) {
            if (res && res.ok && res.data) {
              if (window.UI && window.UI.showToast) {
                window.UI.showToast({ type: 'success', title: '创建成功', message: '账号已创建' });
              } else {
                alert('账号已创建');
              }
              formEl.reset();
            } else if (res && res.error) {
              showError(res.error.message || '创建失败');
            } else {
              showError('创建失败');
            }
            submitBtn.disabled = false;
            submitBtn.textContent = original;
          }).catch(function() {
            showError('网络错误，请稍后重试');
            submitBtn.disabled = false;
            submitBtn.textContent = original;
          });
        });
      }
    })();
  </script>
</body>
</html>
