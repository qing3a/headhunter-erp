<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - TalentFlow AI</title>
  <link rel="stylesheet" href="../shared/shared.css">
  <style>
    body {
      margin: 0;
      font-family: var(--font-family);
      background-color: var(--color-bg-secondary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .auth-container {
      display: flex;
      width: 100%;
      max-width: 960px;
      background-color: var(--color-bg, #FFFFFF);
      border-radius: 16px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      min-height: 560px;
    }

    .auth-brand {
      flex: 1;
      background-color: var(--color-primary);
      padding: 48px 40px;
      color: #FFFFFF;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .auth-brand::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      top: -100px;
      right: -100px;
    }

    .auth-brand::after {
      content: '';
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      bottom: -60px;
      left: -40px;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      position: relative;
      z-index: 1;
    }

    .brand-logo-icon {
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-logo-text {
      font-size: 22px;
      font-weight: var(--font-weight-bold, 700);
      color: #FFFFFF;
    }

    .auth-brand h1 {
      font-size: 28px;
      font-weight: var(--font-weight-bold, 700);
      margin: 0 0 16px;
      line-height: 1.3;
      position: relative;
      z-index: 1;
    }

    .auth-brand p {
      font-size: var(--font-size-base, 14px);
      line-height: 1.6;
      opacity: 0.85;
      margin: 0;
      position: relative;
      z-index: 1;
    }

    .brand-features {
      margin-top: 40px;
      position: relative;
      z-index: 1;
    }

    .brand-feature {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 20px;
    }

    .brand-feature:last-child {
      margin-bottom: 0;
    }

    .brand-feature-icon {
      width: 20px;
      height: 20px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .brand-feature-text {
      font-size: var(--font-size-sm, 13px);
      line-height: 1.5;
      opacity: 0.9;
    }

    .auth-form-container {
      flex: 1;
      padding: 48px 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .auth-form-header {
      margin-bottom: 32px;
    }

    .auth-form-header h2 {
      font-size: 24px;
      font-weight: var(--font-weight-bold, 700);
      color: var(--color-text-primary, #0F172A);
      margin: 0 0 8px;
    }

    .auth-form-header p {
      font-size: var(--font-size-base, 14px);
      color: var(--color-text-secondary, #475569);
      margin: 0;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-size: var(--font-size-sm, 13px);
      font-weight: var(--font-weight-medium, 500);
      color: var(--color-text-primary, #0F172A);
      margin-bottom: 6px;
    }

    .form-input-wrapper {
      position: relative;
    }

    .form-input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--color-text-tertiary, #94A3B8);
    }

    .form-input {
      width: 100%;
      padding: 10px 12px 10px 40px;
      font-size: var(--font-size-sm, 13px);
      font-family: var(--font-family);
      color: var(--color-text-primary, #0F172A);
      background-color: var(--color-bg, #FFFFFF);
      border: 1px solid var(--color-border, #E2E8F0);
      border-radius: var(--radius-md, 8px);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      box-sizing: border-box;
    }

    .form-input:focus {
      border-color: var(--color-primary-light, #14B8A6);
      box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.1);
    }

    .form-input::placeholder {
      color: var(--color-text-tertiary, #94A3B8);
    }

    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .form-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .form-checkbox input {
      width: 16px;
      height: 16px;
      accent-color: var(--color-primary, #0D9488);
    }

    .form-checkbox span {
      font-size: var(--font-size-sm, 13px);
      color: var(--color-text-secondary, #475569);
    }

    .form-forgot-link {
      font-size: var(--font-size-sm, 13px);
      color: var(--color-primary, #0D9488);
      text-decoration: none;
      font-weight: var(--font-weight-medium, 500);
    }

    .form-forgot-link:hover {
      text-decoration: underline;
    }

    .btn-submit {
      width: 100%;
      padding: 12px;
      font-size: var(--font-size-base, 14px);
      font-weight: var(--font-weight-semibold, 600);
      font-family: var(--font-family);
      color: var(--color-text-on-primary, #FFFFFF);
      background-color: var(--color-primary, #0D9488);
      border: none;
      border-radius: var(--radius-md, 8px);
      cursor: pointer;
      transition: background-color 0.15s ease;
    }

    .btn-submit:hover {
      background-color: var(--color-primary-dark, #0F766E);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .form-error {
      color: var(--state-error, #EF4444);
      font-size: var(--font-size-sm, 13px);
      margin-top: 12px;
      min-height: 18px;
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
    }

    .auth-divider-line {
      flex: 1;
      height: 1px;
      background-color: var(--color-border, #E2E8F0);
    }

    .auth-divider-text {
      font-size: var(--font-size-xs, 12px);
      color: var(--color-text-tertiary, #94A3B8);
    }

    .auth-footer {
      text-align: center;
      font-size: var(--font-size-sm, 13px);
      color: var(--color-text-secondary, #475569);
    }

    .auth-footer a {
      color: var(--color-primary, #0D9488);
      text-decoration: none;
      font-weight: var(--font-weight-medium, 500);
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .auth-container {
        flex-direction: column;
      }
      .auth-brand {
        padding: 32px 24px;
      }
      .auth-form-container {
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-brand">
      <div class="brand-logo">
        <div class="brand-logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div class="brand-logo-text">TalentFlow AI</div>
      </div>
      <h1>智能猎头<br>让招聘更高效</h1>
      <p>AI 驱动的候选人匹配，助力猎头团队快速找到最优人才</p>
      <div class="brand-features">
        <div class="brand-feature">
          <div class="brand-feature-icon">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <div class="brand-feature-text">AI 智能匹配，精准推荐高契合度候选人</div>
        </div>
        <div class="brand-feature">
          <div class="brand-feature-icon">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <div class="brand-feature-text">简历自动解析，一键入库结构化管理</div>
        </div>
        <div class="brand-feature">
          <div class="brand-feature-icon">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <div class="brand-feature-text">全流程招聘管理，团队协作更高效</div>
        </div>
      </div>
    </div>
    <div class="auth-form-container">
      <div class="auth-form-header">
        <h2>欢迎回来</h2>
        <p>登录您的账户继续使用</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="username">用户名</label>
          <div class="form-input-wrapper">
            <svg class="form-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="username" name="username" class="form-input" placeholder="请输入用户名" autocomplete="username" required autofocus>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">密码</label>
          <div class="form-input-wrapper">
            <svg class="form-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0"/>
            </svg>
            <input type="password" id="password" name="password" class="form-input" placeholder="请输入密码" autocomplete="current-password" required>
          </div>
        </div>
        <div class="form-options">
          <label class="form-checkbox">
            <input type="checkbox" id="rememberMe">
            <span>记住我</span>
          </label>
          <a href="forgot-password.html" class="form-forgot-link">忘记密码？</a>
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">登录</button>
        <div class="form-error" id="formError"></div>
      </form>
      <div class="auth-footer">
        还没有账户？<a href="register.html">立即注册</a>
      </div>
    </div>
  </div>

  <script src="../shared/auth.js"></script>
  <script src="../shared/menu-config.js"></script>
  <script src="../shared/loading.js"></script>
  <script src="../shared/router.js"></script>
  <script src="../shared/api.js"></script>
  <script>
    (function() {
      var usernameInput = document.getElementById('username');
      var passwordInput = document.getElementById('password');
      var rememberCb = document.getElementById('rememberMe');
      var submitBtn = document.getElementById('submitBtn');
      var formError = document.getElementById('formError');
      var loginForm = document.getElementById('loginForm');

      if (window.Auth && window.Auth.isLoggedIn()) {
        var returnUrl = window.Router && window.Router.getParam ? window.Router.getParam('returnUrl') : null;
        if (returnUrl) {
          window.location.href = decodeURIComponent(returnUrl);
        } else {
          window.location.href = '/pages/dashboard.html';
        }
        return;
      }

      var savedRemember = localStorage.getItem('erp_login_remember');
      if (savedRemember === '1') {
        var savedUser = localStorage.getItem('erp_login_username');
        if (savedUser) usernameInput.value = savedUser;
        rememberCb.checked = true;
      }

      function showError(msg) {
        formError.textContent = msg || '';
      }

      loginForm.addEventListener('submit', function(e) {
        e.preventDefault();
        var username = usernameInput.value.trim();
        var password = passwordInput.value;
        if (!username) {
          showError('请输入用户名');
          return;
        }
        if (!password) {
          showError('请输入密码');
          return;
        }

        showError('');
        submitBtn.disabled = true;
        var originalText = submitBtn.textContent;
        submitBtn.textContent = '登录中...';

        var safetyTimer = setTimeout(function() {
          showError('请求超时，请重试');
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
        }, 15000);

        function reset() {
          clearTimeout(safetyTimer);
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
          if (window.Loading && typeof window.Loading.forceHide === 'function') {
            window.Loading.forceHide();
          }
        }

        Promise.resolve(window.API.auth.login(username, password))
          .then(function(data) {
            clearTimeout(safetyTimer);
            var payload = data && data.data ? data.data : data;
            if (payload && payload.token && payload.user) {
              window.Auth.setSession(payload.token, payload.user);
              if (rememberCb.checked) {
                localStorage.setItem('erp_login_remember', '1');
                localStorage.setItem('erp_login_username', username);
              } else {
                localStorage.removeItem('erp_login_remember');
                localStorage.removeItem('erp_login_username');
              }
              // ===== P3-19 修复：登录成功后回跳到 401 前保存的 URL =====
              try {
                var lastUrl = sessionStorage.getItem('lastUrl');
                if (lastUrl) {
                  sessionStorage.removeItem('lastUrl');
                  window.location.href = lastUrl;
                  return;
                }
              } catch (e) { /* 忽略 */ }

              var returnUrl = window.Router && window.Router.getParam ? window.Router.getParam('returnUrl') : null;
              if (returnUrl) {
                window.location.href = decodeURIComponent(returnUrl);
              } else {
                window.Router.go('dashboard');
              }
              return;
            }
            showError(data && data.error && data.error.message ? data.error.message : '登录失败，请检查用户名和密码');
            reset();
          })
          .catch(function(err) {
            clearTimeout(safetyTimer);
            console.error('Login error:', err);
            showError('网络错误，请稍后重试');
            reset();
          });
      });
    })();
  </script>
</body>
</html>
