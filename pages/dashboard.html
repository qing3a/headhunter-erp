<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工作台 - TalentFlow AI</title>
  <link rel="stylesheet" href="../shared/shared.css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
  <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
  <style id="pageStyle">
    .kpi-card {
      position: relative;
      overflow: hidden;
    }
    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background-color: var(--color-primary, #0D9488);
    }

    .task-card {
      position: relative;
      overflow: hidden;
    }
    .task-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 3px;
      background-color: var(--color-primary, #0D9488);
    }

    .timeline-item {
      position: relative;
    }
    .timeline-item::before {
      content: '';
      position: absolute;
      left: 5px;
      top: 24px;
      bottom: -12px;
      width: 1px;
      background-color: var(--color-border, #E2E8F0);
    }
    .timeline-item:last-child::before {
      display: none;
    }
  </style>
</head>
<body>
  <div id="pageContent">
    <section class="grid grid-cols-4 gap-4 mb-6" id="kpiSection">
      <div class="kpi-card rounded-lg bg-white border" style="border-color: var(--color-border, #E2E8F0); padding: 20px;">
        <p class="text-sm font-medium mb-1" style="color: var(--color-text-secondary, #475569);">候选人总数</p>
        <p class="text-2xl font-bold" style="color: var(--color-text-primary, #0F172A);" data-kpi="total_candidates">--</p>
        <p class="text-xs mt-2" style="color: var(--color-text-tertiary, #94A3B8);">平台数据</p>
      </div>
      <div class="kpi-card rounded-lg bg-white border" style="border-color: var(--color-border, #E2E8F0); padding: 20px;">
        <p class="text-sm font-medium mb-1" style="color: var(--color-text-secondary, #475569);">今日新增用户</p>
        <p class="text-2xl font-bold" style="color: var(--color-text-primary, #0F172A);" data-kpi="today_new_users">--</p>
        <p class="text-xs mt-2" style="color: var(--state-success, #10B981);">实时统计</p>
      </div>
      <div class="kpi-card rounded-lg bg-white border" style="border-color: var(--color-border, #E2E8F0); padding: 20px;">
        <p class="text-sm font-medium mb-1" style="color: var(--color-text-secondary, #475569);">开放职位</p>
        <p class="text-2xl font-bold" style="color: var(--color-text-primary, #0F172A);" data-kpi="open_jobs">--</p>
        <p class="text-xs mt-2" style="color: var(--color-text-tertiary, #94A3B8);">进行中</p>
      </div>
      <div class="kpi-card rounded-lg bg-white border" style="border-color: var(--color-border, #E2E8F0); padding: 20px;">
        <p class="text-sm font-medium mb-1" style="color: var(--color-text-secondary, #475569);">推荐记录</p>
        <p class="text-2xl font-bold" style="color: var(--color-text-primary, #0F172A);" data-kpi="total_recommendations">--</p>
        <p class="text-xs mt-2" style="color: var(--state-success, #10B981);" data-kpi-sub="today_new_recommendations">今日新增 --</p>
      </div>
    </section>

    <section class="grid gap-6 mb-6" style="grid-template-columns: 3fr 2fr;">
      <div>
        <h2 class="text-base font-semibold mb-3" style="color: var(--color-text-primary, #0F172A);">待办任务</h2>
        <div class="flex flex-col gap-3" id="taskList"></div>
      </div>

      <div>
        <h2 class="text-base font-semibold mb-3" style="color: var(--color-text-primary, #0F172A);">最近推荐</h2>
        <div class="flex flex-col gap-4" id="recentRecommendations">
          <div class="timeline-item flex gap-3">
            <div class="flex flex-col items-center flex-shrink-0 pt-0.5">
              <div class="w-3 h-3 rounded-full" style="background-color: var(--color-border, #E2E8F0);"></div>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-xs mb-1" style="color: var(--color-text-tertiary, #94A3B8);">加载中...</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section>
      <h2 class="text-base font-semibold mb-3" style="color: var(--color-text-primary, #0F172A);">快捷操作</h2>
      <div class="grid grid-cols-4 gap-4">
        <button class="flex items-center gap-3 rounded-lg bg-white border px-5 py-4 transition-colors hover:border-[var(--color-primary-light, #14B8A6)]" style="border-color: var(--color-border, #E2E8F0); text-align: left;">
          <div class="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0" style="background-color: var(--color-primary-lightest, #CCFBF1);">
            <i data-lucide="upload" class="w-5 h-5" style="color: var(--color-primary, #0D9488);"></i>
          </div>
          <span class="text-sm font-medium" style="color: var(--color-text-primary, #0F172A);">批量导入简历</span>
        </button>
        <button class="flex items-center gap-3 rounded-lg bg-white border px-5 py-4 transition-colors hover:border-[var(--color-primary-light, #14B8A6)]" style="border-color: var(--color-border, #E2E8F0); text-align: left;">
          <div class="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0" style="background-color: var(--color-primary-lightest, #CCFBF1);">
            <i data-lucide="sparkles" class="w-5 h-5" style="color: var(--color-primary, #0D9488);"></i>
          </div>
          <span class="text-sm font-medium" style="color: var(--color-text-primary, #0F172A);">AI 智能匹配</span>
        </button>
        <button class="flex items-center gap-3 rounded-lg bg-white border px-5 py-4 transition-colors hover:border-[var(--color-primary-light, #14B8A6)]" style="border-color: var(--color-border, #E2E8F0); text-align: left;">
          <div class="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0" style="background-color: var(--color-primary-lightest, #CCFBF1);">
            <i data-lucide="plus" class="w-5 h-5" style="color: var(--color-primary, #0D9488);"></i>
          </div>
          <span class="text-sm font-medium" style="color: var(--color-text-primary, #0F172A);">创建新职位</span>
        </button>
        <button class="flex items-center gap-3 rounded-lg bg-white border px-5 py-4 transition-colors hover:border-[var(--color-primary-light, #14B8A6)]" style="border-color: var(--color-border, #E2E8F0); text-align: left;">
          <div class="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0" style="background-color: var(--color-primary-lightest, #CCFBF1);">
            <i data-lucide="file-text" class="w-5 h-5" style="color: var(--color-primary, #0D9488);"></i>
          </div>
          <span class="text-sm font-medium" style="color: var(--color-text-primary, #0F172A);">生成周报</span>
        </button>
      </div>
    </section>
  </div>

  <script src="../shared/auth.js"></script>
  <script src="../shared/menu-config.js"></script>
  <script src="../shared/loading.js"></script>
  <script src="../shared/router.js"></script>
  <script src="../shared/api.js"></script>
  <script src="../shared/shared.js"></script>
  <script src="../shared/layout.js"></script>
  <script>
    if (!window.Auth || !Auth.isLoggedIn()) {
      if (window.Auth) Auth.requireLogin();
      else location.replace('../pages/login.html');
    }
  </script>
  <script>
    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    function getTaskBadgeClass(priority) {
      if (priority === 'high') return 'background-color: var(--state-error-light, #FEE2E2); color: var(--state-error, #EF4444);';
      if (priority === 'medium') return 'background-color: var(--state-warning-light, #FEF3C7); color: var(--state-warning, #F59E0B);';
      return 'background-color: var(--color-bg-tertiary, #F1F5F9); color: var(--color-text-secondary, #475569);';
    }

    function getTaskBadgeText(priority) {
      if (priority === 'high') return '紧急';
      if (priority === 'medium') return '重要';
      return '一般';
    }

    function renderTasks(tasks) {
      const filtered = tasks.filter(t => t.status !== 'completed').slice(0, 6);
      if (filtered.length === 0) {
        document.getElementById('taskList').innerHTML = `
          <div class="task-card rounded-lg bg-white border pl-5" style="border-color: var(--color-border, #E2E8F0); padding: 14px 16px 14px 20px;">
            <p class="text-sm" style="color: var(--color-text-secondary, #475569);">暂无待办任务</p>
          </div>`;
        return;
      }
      const html = filtered.map(task => `
        <div class="task-card rounded-lg bg-white border pl-5" style="border-color: var(--color-border, #E2E8F0); padding: 14px 16px 14px 20px;">
          <div class="flex items-start justify-between gap-3">
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium" style="color: var(--color-text-primary, #0F172A);">${escapeHtml(task.title)}</p>
              <p class="text-xs mt-1" style="color: var(--color-text-secondary, #475569);">${escapeHtml(task.description || task.desc || '')}</p>
            </div>
            <span class="inline-flex items-center flex-shrink-0 rounded-full px-2.5 py-0.5 text-xs font-medium" style="${getTaskBadgeClass(task.priority)}">${getTaskBadgeText(task.priority)}</span>
          </div>
        </div>`).join('');
      document.getElementById('taskList').innerHTML = html;
    }

    function renderKpiStats(stats) {
      const kpiMap = {
        total_candidates: stats.total_candidates,
        open_jobs: stats.total_jobs,
        total_recommendations: stats.total_clients !== undefined ? stats.total_clients : stats.total_recommendations,
        interviews_count: stats.interviews_count,
        pending_tasks: stats.pending_tasks,
        completed_tasks: stats.completed_tasks,
      };
      document.querySelectorAll('[data-kpi]').forEach(el => {
        const key = el.dataset.kpi;
        const value = kpiMap[key] !== undefined ? kpiMap[key] : stats[key];
        if (value !== undefined) {
          el.textContent = typeof value === 'number'
            ? value.toLocaleString()
            : value;
        }
      });
      document.querySelectorAll('[data-kpi-sub]').forEach(el => {
        const key = el.dataset.kpiSub;
        if (stats[key] !== undefined) {
          el.textContent = `今日新增 ${stats[key]}`;
        }
      });
    }

    function renderEmptyRecommendations() {
      document.getElementById('recentRecommendations').innerHTML = `
        <div class="timeline-item flex gap-3">
          <div class="flex flex-col items-center flex-shrink-0 pt-0.5">
            <div class="w-3 h-3 rounded-full" style="background-color: var(--color-border, #E2E8F0);"></div>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-xs mb-1" style="color: var(--color-text-tertiary, #94A3B8);">暂无推荐</p>
            <p class="text-sm" style="color: var(--color-text-secondary, #475569);">还没有推荐记录</p>
          </div>
        </div>`;
    }

    async function loadTasks() {
      try {
        const res = await API.tasks.list({ pageSize: 20 });
        if (res.ok && res.data) {
          const tasks = res.data.items || res.data.list || res.data || [];
          renderTasks(tasks);
        } else {
          renderTasks([]);
          if (res.error?.message) {
            UI.showToast({ type: 'error', title: '加载失败', message: res.error.message });
          }
        }
      } catch (e) {
        console.warn('加载任务失败:', e);
        renderTasks([]);
        UI.showToast({ type: 'error', title: '加载失败', message: '无法获取待办任务' });
      }
    }

    async function loadDashboard() {
      loadTasks();
      try {
        const res = await API.dashboard.getStats();
        if (res.ok && res.data) {
          renderKpiStats(res.data);
        } else {
          if (res.error?.message) {
            UI.showToast({ type: 'error', title: '加载失败', message: res.error.message });
          }
        }
      } catch (e) {
        console.warn('加载 KPI 失败:', e);
        UI.showToast({ type: 'error', title: '加载失败', message: '无法获取统计数据' });
      }

      renderEmptyRecommendations();
    }

    loadDashboard();
  </script>
  <div class="shortcuts-hint" style="position:fixed;bottom:16px;right:16px;font-size:12px;color:var(--color-text-tertiary);opacity:0.7;">
    按 <kbd style="background:var(--color-bg-tertiary);padding:1px 4px;border-radius:3px;margin:0 2px;">?</kbd> 查看快捷键
  </div>
</body>
</html>
