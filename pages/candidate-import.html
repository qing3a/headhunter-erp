<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导入候选人 - TalentFlow AI</title>
  <link rel="stylesheet" href="../shared/shared.css">
  <script src="../shared/auth.js"></script>
  <script src="../shared/loading.js"></script>
  <script src="../shared/router.js"></script>
  <script src="../shared/api.js"></script>
  <style id="pageStyle">
    .import-container { max-width: 960px; margin: 0 auto; }
    .import-card { background: var(--color-bg-surface, #fff); border: 1px solid var(--color-border); border-radius: 8px; padding: 24px; margin-bottom: 16px; }
    .upload-area { border: 2px dashed var(--color-border); border-radius: 8px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.15s; }
    .upload-area:hover, .upload-area.dragover { border-color: var(--color-primary); background: var(--color-primary-lightest, #CCFBF1); }
    .upload-area .icon { font-size: 36px; margin-bottom: 8px; }
    .file-info { background: var(--color-bg-page-secondary, #f9fafb); border-radius: 6px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; margin-top: 12px; }
    .file-info .name { flex: 1; font-weight: 500; }
    .mapping-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .mapping-table th, .mapping-table td { padding: 8px; text-align: left; border-bottom: 1px solid var(--color-border-light); }
    .mapping-table th { background: var(--color-bg-page-secondary, #f9fafb); font-weight: 600; }
    .mapping-table select { padding: 4px 8px; border: 1px solid var(--color-border); border-radius: 4px; }
    .preview-table { width: 100%; border-collapse: collapse; font-size: 12px; max-height: 300px; overflow: auto; display: block; }
    .preview-table th, .preview-table td { padding: 6px 10px; border: 1px solid var(--color-border-light); white-space: nowrap; }
    .preview-table th { background: var(--color-bg-page-secondary, #f9fafb); font-weight: 600; position: sticky; top: 0; }
    .preview-table-container { max-height: 300px; overflow: auto; border: 1px solid var(--color-border-light); border-radius: 6px; }
    .actions-row { display: flex; gap: 12px; margin-top: 16px; }
    .result-stats { display: flex; gap: 24px; padding: 16px; }
    .result-stat { text-align: center; }
    .result-stat .num { font-size: 24px; font-weight: 600; }
    .result-stat.success .num { color: #059669; }
    .result-stat.failed .num { color: #dc2626; }
    .result-stat.skipped .num { color: #d97706; }
    .result-stat .label { font-size: 12px; color: var(--color-text-secondary); margin-top: 4px; }
  </style>
</head>
<body>
  <div id="pageContent">
    <div class="import-container">
      <h2 style="margin:0 0 20px 0;font-size:20px;">导入候选人</h2>

      <!-- Step 1: 下载模板 + 上传 -->
      <div class="import-card">
        <h3 style="margin:0 0 12px 0;font-size:15px;">1. 准备 Excel</h3>
        <p style="color:var(--color-text-secondary);font-size:13px;margin:0 0 16px 0;">下载标准模板，按列填写。文件 ≤ 5MB。</p>
        <div class="actions-row">
          <button class="btn btn-secondary" id="downloadTemplateBtn">📥 下载 Excel 模板</button>
        </div>

        <div style="margin-top:24px;border-top:1px solid var(--color-border-light);padding-top:24px;">
          <h3 style="margin:0 0 12px 0;font-size:15px;">2. 上传文件</h3>
          <div class="upload-area" id="uploadArea">
            <div class="icon">📤</div>
            <p style="margin:0 0 4px 0;">点击或拖拽 .xlsx / .xls 文件到此处</p>
            <p style="margin:0;font-size:12px;color:var(--color-text-secondary);">支持 .xlsx, .xls 格式</p>
            <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none;">
          </div>
          <div class="file-info" id="fileInfo" style="display:none;">
            <span>📄</span>
            <div class="name" id="fileName">--</div>
            <span id="fileSize" style="color:var(--color-text-secondary);font-size:12px;">--</span>
            <button class="btn btn-secondary btn-sm" id="removeFileBtn">移除</button>
          </div>
        </div>
      </div>

      <!-- Step 3: 字段映射 + 预览 -->
      <div class="import-card" id="mappingCard" style="display:none;">
        <h3 style="margin:0 0 12px 0;font-size:15px;">3. 字段映射</h3>
        <p style="color:var(--color-text-secondary);font-size:13px;margin:0 0 16px 0;">系统已自动匹配表头，可手动调整：</p>
        <table class="mapping-table" id="mappingTable"></table>

        <h3 style="margin:24px 0 12px 0;font-size:15px;">4. 数据预览（前 5 行）</h3>
        <div class="preview-table-container">
          <table class="preview-table" id="previewTable"></table>
        </div>

        <div class="actions-row">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;">
            <input type="checkbox" id="skipDuplicates" checked>
            遇到重复邮箱自动跳过
          </label>
          <div style="flex:1;"></div>
          <button class="btn btn-secondary" id="cancelBtn">取消</button>
          <button class="btn btn-primary" id="commitBtn">确认导入</button>
        </div>
      </div>
    </div>
  </div>

  <script id="pageScript">
    (function () {
      var state = { file: null, preview: null, mapping: {} };
      var FIELD_OPTIONS = [
        { value: '', label: '-- 忽略此列 --' },
        { value: 'name', label: '姓名' },
        { value: 'gender', label: '性别' },
        { value: 'phone', label: '手机号' },
        { value: 'email', label: '邮箱' },
        { value: 'current_position', label: '当前职位' },
        { value: 'current_company', label: '当前公司' },
        { value: 'years_of_experience', label: '工作年限' },
        { value: 'education_level', label: '学历' },
        { value: 'current_city', label: '所在城市' },
        { value: 'expected_salary_min', label: '期望薪资下限(k)' },
        { value: 'expected_salary_max', label: '期望薪资上限(k)' },
        { value: 'expected_position', label: '期望职位' },
        { value: 'expected_industry', label: '期望行业' },
        { value: 'expected_city', label: '期望城市' },
        { value: 'available_at', label: '到岗时间' },
        { value: 'status', label: '求职状态' },
        { value: 'source_channel', label: '来源渠道' },
        { value: 'notes', label: '备注' }
      ];

      function on(id, evt, handler) {
        var el = document.getElementById(id);
        if (el) el.addEventListener(evt, handler);
      }

      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / 1024 / 1024).toFixed(1) + ' MB';
      }

      function downloadTemplate() {
        var token = window.Auth.getToken();
        fetch('/api/v1/imports/template', { headers: { 'Authorization': 'Bearer ' + token } })
          .then(function (r) {
            if (!r.ok) throw new Error('下载失败');
            return r.blob();
          })
          .then(function (blob) {
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'candidates_template.xlsx';
            a.click();
            URL.revokeObjectURL(url);
            window.UI.showToast({ type: 'success', title: '已下载', message: '模板已下载' });
          })
          .catch(function (e) {
            window.UI.showToast({ type: 'error', title: '下载失败', message: e.message });
          });
      }

      function handleFile(file) {
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) {
          window.UI.showToast({ type: 'error', title: '文件过大', message: '文件不能超过 5MB' });
          return;
        }
        state.file = file;
        document.getElementById('fileName').textContent = file.name;
        document.getElementById('fileSize').textContent = formatSize(file.size);
        document.getElementById('fileInfo').style.display = '';
        // 调 preview
        window.API.imports.preview(file).then(function (r) {
          if (!r || !r.ok) {
            window.UI.showToast({ type: 'error', title: '解析失败', message: (r && r.error && r.error.message) || '无法解析 Excel' });
            return;
          }
          state.preview = r.data;
          state.mapping = Object.assign({}, r.data.suggestedMapping);
          renderMappingTable();
          renderPreviewTable();
          document.getElementById('mappingCard').style.display = '';
        });
      }

      function renderMappingTable() {
        var headers = state.preview.headers;
        var html = '<thead><tr><th>Excel 列名</th><th style="width:280px;">→ 系统字段</th></tr></thead><tbody>';
        headers.forEach(function (h) {
          html += '<tr>' +
            '<td>' + escapeHtml(h) + '</td>' +
            '<td><select data-col="' + escapeHtml(h) + '">' +
              FIELD_OPTIONS.map(function (o) {
                var sel = (state.mapping[h] || '') === o.value ? ' selected' : '';
                return '<option value="' + o.value + '"' + sel + '>' + o.label + '</option>';
              }).join('') +
            '</select></td>' +
          '</tr>';
        });
        html += '</tbody>';
        document.getElementById('mappingTable').innerHTML = html;

        // 绑定 select 变化
        document.querySelectorAll('#mappingTable select').forEach(function (sel) {
          sel.addEventListener('change', function () {
            var col = sel.getAttribute('data-col');
            if (sel.value) state.mapping[col] = sel.value;
            else delete state.mapping[col];
          });
        });
      }

      function renderPreviewTable() {
        var headers = state.preview.headers;
        var rows = state.preview.previewRows || [];
        var html = '<thead><tr>' + headers.map(function (h) { return '<th>' + escapeHtml(h) + '</th>'; }).join('') + '</tr></thead><tbody>';
        rows.forEach(function (r) {
          html += '<tr>' + headers.map(function (h) { return '<td>' + escapeHtml(r[h] || '') + '</td>'; }).join('') + '</tr>';
        });
        html += '</tbody>';
        document.getElementById('previewTable').innerHTML = html;
      }

      function doCommit() {
        if (!state.file) return;
        var skipDuplicates = document.getElementById('skipDuplicates').checked;
        window.API.imports.commit(state.file, state.mapping, skipDuplicates).then(function (r) {
          if (!r || !r.ok) {
            window.UI.showToast({ type: 'error', title: '导入失败', message: (r && r.error && r.error.message) || '导入失败' });
            return;
          }
          showResult(r.data);
        });
      }

      function showResult(data) {
        var html = '<div class="result-stats">' +
          '<div class="result-stat success"><div class="num">' + (data.success || 0) + '</div><div class="label">成功</div></div>' +
          '<div class="result-stat failed"><div class="num">' + (data.failed || 0) + '</div><div class="label">失败</div></div>' +
          '<div class="result-stat skipped"><div class="num">' + (data.skipped || 0) + '</div><div class="label">跳过</div></div>' +
        '</div>';
        if (data.errors && data.errors.length) {
          html += '<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:12px;margin:0 16px 12px 16px;max-height:200px;overflow:auto;">' +
            '<strong style="color:#dc2626;font-size:13px;">失败明细：</strong><ul style="margin:8px 0 0 0;padding-left:20px;font-size:12px;">';
          data.errors.forEach(function (e) { html += '<li>第 ' + e.row + ' 行：' + escapeHtml(e.error) + '</li>'; });
          html += '</ul></div>';
        }
        if (data.skippedItems && data.skippedItems.length) {
          html += '<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:12px;margin:0 16px 12px 16px;max-height:200px;overflow:auto;">' +
            '<strong style="color:#d97706;font-size:13px;">跳过明细：</strong><ul style="margin:8px 0 0 0;padding-left:20px;font-size:12px;">';
          data.skippedItems.forEach(function (e) { html += '<li>第 ' + e.row + ' 行 ' + escapeHtml(e.name) + '：' + escapeHtml(e.reason) + '</li>'; });
          html += '</ul></div>';
        }
        window.UI.showModal({
          title: '导入完成',
          content: html, confirmText: '查看候选人库', cancelText: '继续导入', showCancel: true, width: 600,
          onConfirm: function () { window.Router.navigate('candidate-pool.html'); }
        });
      }

      function resetAll() {
        state.file = null;
        state.preview = null;
        state.mapping = {};
        document.getElementById('fileInfo').style.display = 'none';
        document.getElementById('mappingCard').style.display = 'none';
        document.getElementById('fileInput').value = '';
      }

      function bind() {
        on('downloadTemplateBtn', 'click', downloadTemplate);
        var uploadArea = document.getElementById('uploadArea');
        var fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('click', function () { fileInput.click(); });
        fileInput.addEventListener('change', function (e) { handleFile(e.target.files[0]); });

        uploadArea.addEventListener('dragover', function (e) { e.preventDefault(); uploadArea.classList.add('dragover'); });
        uploadArea.addEventListener('dragleave', function () { uploadArea.classList.remove('dragover'); });
        uploadArea.addEventListener('drop', function (e) {
          e.preventDefault();
          uploadArea.classList.remove('dragover');
          if (e.dataTransfer.files && e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
        });

        on('removeFileBtn', 'click', resetAll);
        on('cancelBtn', 'click', resetAll);
        on('commitBtn', 'click', doCommit);
      }

      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', bind);
      else bind();
    })();
  </script>
  <script src="../shared/shared.js"></script>
  <script src="../shared/layout.js"></script>
</body>
</html>
