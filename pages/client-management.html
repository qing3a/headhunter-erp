<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客户管理</title>
  <link rel="stylesheet" href="../shared/shared.css">
  <script src="../shared/auth.js"></script>
  <script src="../shared/loading.js"></script>
  <script src="../shared/router.js"></script>
  <script src="../shared/api.js"></script>
  <style id="pageStyle">
    .client-toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; }
    .client-toolbar input { flex: 1; max-width: 320px; padding: 8px 12px; border: 1px solid var(--color-border); border-radius: 6px; font-size: 14px; }
    .client-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    .client-card { background: var(--color-bg-surface, #fff); border: 1px solid var(--color-border); border-radius: 8px; padding: 16px; }
    .client-card .name { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .client-card .meta { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
    .client-card .actions { display: flex; gap: 4px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--color-border-light); }
    .client-card .actions button { flex: 1; background: none; border: 1px solid var(--color-border); padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; color: var(--color-text-secondary); }
    .client-card .actions button:hover { background: var(--color-bg-page-secondary); }
    .client-card .actions button.danger:hover { color: #dc2626; border-color: #dc2626; }
    .status-pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
    .status-pill.active { background: #d1fae5; color: #065f46; }
    .status-pill.inactive { background: #f3f4f6; color: #4b5563; }
    .notes-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
    .note-item { background: var(--color-bg-page-secondary, #f9fafb); border-radius: 6px; padding: 10px 12px; }
    .note-item .meta { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; }
    .note-item .content { font-size: 13px; line-height: 1.5; white-space: pre-wrap; }
    .note-item .actions { display: flex; gap: 8px; margin-top: 6px; }
    .note-item .actions button { background: none; border: none; color: var(--color-text-secondary); cursor: pointer; font-size: 12px; padding: 0; }
    .note-item .actions button:hover { color: var(--color-primary); }
  </style>
</head>
<body>
  <div id="pageContent">
    <div class="client-toolbar">
      <input type="text" id="searchInput" placeholder="搜索客户名 / 联系人 / 行业">
      <button class="btn btn-primary" id="newBtn">+ 新建客户</button>
    </div>
    <div class="client-grid" id="clientGrid"></div>
  </div>

  <script id="pageScript">
    (function () {
      var state = { page: 1, pageSize: 30, keyword: '', list: [] };
      var debounceTimer;

      function on(id, evt, handler) {
        var el = document.getElementById(id);
        if (el) el.addEventListener(evt, handler);
      }

      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }

      function closeOpenModal() {
        document.querySelectorAll('.modal.show').forEach(function (m) { m.classList.remove('show'); setTimeout(function () { m.remove(); }, 200); });
      }

      function loadClients() {
        window.API.clients.list({
          keyword: state.keyword || undefined,
          page: state.page,
          pageSize: state.pageSize
        }).then(function (r) {
          if (!r || !r.ok) return;
          state.list = r.data || [];
          render();
        });
      }

      function render() {
        var grid = document.getElementById('clientGrid');
        if (!state.list.length) {
          grid.innerHTML = '<div style="grid-column:1/-1;padding:60px 20px;text-align:center;color:var(--color-text-secondary);">暂无客户，点击右上角"新建客户"开始添加</div>';
          return;
        }
        grid.innerHTML = state.list.map(function (c) {
          var meta = [];
          if (c.industry) meta.push(c.industry);
          if (c.city) meta.push(c.city);
          if (c.contact_name) meta.push('联系人：' + c.contact_name);
          return '<div class="client-card" data-id="' + c.id + '">' +
            '<div style="display:flex;align-items:flex-start;gap:8px;">' +
              '<div style="flex:1;">' +
                '<div class="name">' + escapeHtml(c.name) + '</div>' +
                '<div class="meta">' + meta.map(escapeHtml).join(' · ') + '</div>' +
              '</div>' +
              '<span class="status-pill ' + (c.status || 'active') + '">' + ({active: '活跃', inactive: '停用'})[c.status] || c.status + '</span>' +
            '</div>' +
            (c.notes ? '<div style="font-size:12px;color:var(--color-text-secondary);margin-top:8px;line-height:1.4;">' + escapeHtml(c.notes).substring(0, 100) + (c.notes.length > 100 ? '...' : '') + '</div>' : '') +
            '<div class="actions">' +
              '<button data-act="view">详情/备注</button>' +
              '<button data-act="edit">编辑</button>' +
              '<button data-act="delete" class="danger">删除</button>' +
            '</div>' +
          '</div>';
        }).join('');
      }

      function openClientModal(existing) {
        var isEdit = !!existing;
        var c = existing || {};
        var html = '<form id="clientForm" class="form">' +
          '<div class="form-row">' +
            '<div class="form-group"><label class="form-label required">客户名称</label><input class="form-input" name="name" required value="' + escapeHtml(c.name) + '"></div>' +
            '<div class="form-group"><label class="form-label">行业</label><input class="form-input" name="industry" value="' + escapeHtml(c.industry) + '"></div>' +
          '</div>' +
          '<div class="form-row" style="margin-top:12px;">' +
            '<div class="form-group"><label class="form-label">城市</label><input class="form-input" name="city" value="' + escapeHtml(c.city) + '"></div>' +
            '<div class="form-group"><label class="form-label">联系人</label><input class="form-input" name="contact_name" value="' + escapeHtml(c.contact_name) + '"></div>' +
          '</div>' +
          '<div class="form-row" style="margin-top:12px;">' +
            '<div class="form-group"><label class="form-label">联系邮箱</label><input class="form-input" name="contact_email" type="email" value="' + escapeHtml(c.contact_email) + '"></div>' +
            '<div class="form-group"><label class="form-label">联系电话</label><input class="form-input" name="contact_phone" value="' + escapeHtml(c.contact_phone) + '"></div>' +
          '</div>' +
          '<div class="form-group" style="margin-top:12px;"><label class="form-label">备注</label><textarea class="form-textarea" name="notes" rows="3">' + escapeHtml(c.notes || '') + '</textarea></div>' +
        '</form>';
        window.UI.showModal({
          title: isEdit ? '编辑客户' : '新建客户',
          content: html, confirmText: '保存', cancelText: '取消', showCancel: true, width: 600,
          onConfirm: function () { submitClient(isEdit, existing); }
        });
      }

      function submitClient(isEdit, existing) {
        var form = document.getElementById('clientForm');
        if (!form) return;
        var btn = document.querySelector('.modal.show [data-action="confirm"]');
        if (btn) { btn.disabled = true; btn.textContent = '保存中...'; }
        var data = {};
        ['name', 'industry', 'city', 'contact_name', 'contact_email', 'contact_phone', 'notes'].forEach(function (k) {
          var v = form.elements[k].value;
          if (v) data[k] = v;
        });
        if (!data.name) {
          window.UI.showToast({ type: 'warning', title: '提示', message: '请输入客户名称' });
          if (btn) { btn.disabled = false; btn.textContent = '保存'; }
          return;
        }
        var p = isEdit
          ? window.API.clients.update(existing.id, data)
          : window.API.clients.create(data);
        p.then(function (r) {
          if (r && r.ok) {
            window.UI.showToast({ type: 'success', title: '已保存', message: '' });
            closeOpenModal();
            loadClients();
          } else {
            window.UI.showToast({ type: 'error', title: '失败', message: (r && r.error && r.error.message) || '保存失败' });
            if (btn) { btn.disabled = false; btn.textContent = '保存'; }
          }
        });
      }

      function openViewModal(c) {
        window.API.clients.get(c.id).then(function (r) {
          if (!r || !r.ok) return;
          var data = r.data;
          var notes = data.notes || [];
          var notesHtml = notes.length ? notes.map(function (n) {
            return '<div class="note-item" data-nid="' + n.id + '">' +
              '<div class="meta">#' + n.id + ' · ' + (n.created_at || '').substring(0, 16) + (n.follow_up ? ' · 跟进 ' + escapeHtml(n.follow_up) : '') + '</div>' +
              '<div class="content">' + escapeHtml(n.content) + '</div>' +
              '<div class="actions">' +
                '<button data-nact="edit-note">编辑</button>' +
                '<button data-nact="del-note">删除</button>' +
              '</div>' +
            '</div>';
          }).join('') : '<div style="color:var(--color-text-secondary);text-align:center;padding:20px;">暂无备注</div>';
          var html = '<div>' +
            '<div class="form-row">' +
              '<div class="form-group"><div class="form-label">行业</div><div>' + escapeHtml(data.industry || '-') + '</div></div>' +
              '<div class="form-group"><div class="form-label">城市</div><div>' + escapeHtml(data.city || '-') + '</div></div>' +
              '<div class="form-group"><div class="form-label">联系人</div><div>' + escapeHtml(data.contact_name || '-') + '</div></div>' +
            '</div>' +
            '<div class="form-row" style="margin-top:8px;">' +
              '<div class="form-group"><div class="form-label">邮箱</div><div>' + escapeHtml(data.contact_email || '-') + '</div></div>' +
              '<div class="form-group"><div class="form-label">电话</div><div>' + escapeHtml(data.contact_phone || '-') + '</div></div>' +
            '</div>' +
            (data.notes ? '<div style="margin-top:8px;"><div class="form-label">简介</div><div style="font-size:13px;">' + escapeHtml(data.notes) + '</div></div>' : '') +
            '<div style="margin-top:16px;border-top:1px solid var(--color-border-light);padding-top:12px;">' +
              '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">' +
                '<strong style="font-size:13px;">备注 (' + notes.length + ')</strong>' +
                '<button class="btn btn-primary btn-sm" id="addNoteBtn">+ 添加备注</button>' +
              '</div>' +
              '<div class="notes-list">' + notesHtml + '</div>' +
            '</div>' +
          '</div>';
          window.UI.showModal({
            title: data.name,
            content: html, confirmText: '关闭', cancelText: '', showCancel: false, width: 640
          });
          setTimeout(function () {
            var addBtn = document.getElementById('addNoteBtn');
            if (addBtn) addBtn.addEventListener('click', function () { openNoteModal(data, null); });
            document.querySelectorAll('.note-item').forEach(function (el) {
              var nid = el.getAttribute('data-nid');
              var editBtn = el.querySelector('[data-nact="edit-note"]');
              var delBtn = el.querySelector('[data-nact="del-note"]');
              if (editBtn) editBtn.addEventListener('click', function () {
                openNoteModal(data, notes.find(function (n) { return n.id == nid; }));
              });
              if (delBtn) delBtn.addEventListener('click', function () {
                window.UI.showConfirm({ title: '删除备注', content: '确定删除？', type: 'warning', onConfirm: function () {
                  window.API.clients.removeNote(data.id, nid).then(function (r) {
                    if (r && r.ok) { window.UI.showToast({ type: 'success', title: '已删除', message: '' }); openViewModal(data); }
                  });
                }});
              });
            });
          }, 100);
        });
      }

      function openNoteModal(client, existing) {
        var isEdit = !!existing;
        var n = existing || {};
        var html = '<form id="noteForm" class="form">' +
          '<div class="form-group"><label class="form-label required">备注内容</label><textarea class="form-textarea" name="content" required rows="4">' + escapeHtml(n.content || '') + '</textarea></div>' +
          '<div class="form-group" style="margin-top:12px;"><label class="form-label">跟进时间</label><input class="form-input" name="follow_up" placeholder="如 2026-08-01" value="' + escapeHtml(n.follow_up || '') + '"></div>' +
        '</form>';
        window.UI.showModal({
          title: isEdit ? '编辑备注' : '添加备注',
          content: html, confirmText: '保存', cancelText: '取消', showCancel: true, width: 480,
          onConfirm: function () {
            var form = document.getElementById('noteForm');
            if (!form) return;
            var content = form.elements.content.value.trim();
            if (!content) { window.UI.showToast({ type: 'warning', title: '提示', message: '请输入备注' }); return; }
            var data = { content: content, follow_up: form.elements.follow_up.value || '' };
            var p = isEdit
              ? window.API.clients.updateNote(client.id, existing.id, data)
              : window.API.clients.addNote(client.id, data);
            p.then(function (r) {
              if (r && r.ok) { window.UI.showToast({ type: 'success', title: '已保存', message: '' }); openViewModal(client); }
            });
          }
        });
      }

      function bindEvents() {
        on('searchInput', 'input', function (e) {
          clearTimeout(debounceTimer);
          debounceTimer = setTimeout(function () {
            state.keyword = e.target.value.trim();
            state.page = 1;
            loadClients();
          }, 300);
        });
        on('newBtn', 'click', function () { openClientModal(null); });

        document.getElementById('clientGrid').addEventListener('click', function (e) {
          var card = e.target.closest('.client-card');
          if (!card) return;
          var id = parseInt(card.getAttribute('data-id'));
          var act = e.target.getAttribute('data-act');
          var row = state.list.find(function (x) { return x.id === id; });
          if (!row) return;
          if (act === 'view') return openViewModal(row);
          if (act === 'edit') return openClientModal(row);
          if (act === 'delete') {
            window.UI.showConfirm({
              title: '确认删除', content: '确定删除客户 "' + row.name + '"？',
              type: 'warning', confirmText: '删除',
              onConfirm: function () {
                window.API.clients.remove(id).then(function (r) {
                  if (r && r.ok) { window.UI.showToast({ type: 'success', title: '已删除', message: '' }); loadClients(); }
                });
              }
            });
          }
        });
      }

      function init() {
        bindEvents();
        loadClients();
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
  <script src="../shared/shared.js"></script>
  <script src="../shared/layout.js"></script>
</body>
</html>
