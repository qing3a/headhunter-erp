<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>忘记密码 - TalentFlow AI</title>
  <link rel="stylesheet" href="../shared/shared.css">
  <style>
    body {
      margin: 0;
      font-family: var(--font-family);
      background-color: var(--color-bg-secondary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .auth-container {
      display: flex;
      width: 100%;
      max-width: 960px;
      background-color: var(--color-bg, #FFFFFF);
      border-radius: 16px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      min-height: 520px;
    }

    .auth-brand {
      flex: 1;
      background-color: var(--color-primary);
      padding: 48px 40px;
      color: #FFFFFF;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .auth-brand::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      top: -100px;
      right: -100px;
    }

    .auth-brand::after {
      content: '';
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      bottom: -60px;
      left: -40px;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      position: relative;
      z-index: 1;
    }

    .brand-logo-icon {
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-logo-text {
      font-size: 22px;
      font-weight: var(--font-weight-bold, 700);
      color: #FFFFFF;
    }

    .auth-brand h1 {
      font-size: 28px;
      font-weight: var(--font-weight-bold, 700);
      margin: 0 0 16px;
      line-height: 1.3;
      position: relative;
      z-index: 1;
    }

    .auth-brand p {
      font-size: var(--font-size-base, 14px);
      line-height: 1.6;
      opacity: 0.85;
      margin: 0;
      position: relative;
      z-index: 1;
    }

    .brand-help {
      margin-top: 32px;
      position: relative;
      z-index: 1;
    }

    .brand-help-title {
      font-size: var(--font-size-sm, 13px);
      font-weight: var(--font-weight-semibold, 600);
      margin-bottom: 12px;
    }

    .brand-help-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 12px;
      font-size: var(--font-size-sm, 13px);
      opacity: 0.9;
    }

    .brand-help-icon {
      width: 18px;
      height: 18px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
      font-size: 10px;
      font-weight: var(--font-weight-bold, 700);
    }

    .auth-form-container {
      flex: 1;
      padding: 48px 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .auth-form-header {
      margin-bottom: 24px;
    }

    .auth-form-header h2 {
      font-size: 24px;
      font-weight: var(--font-weight-bold, 700);
      color: var(--color-text-primary, #0F172A);
      margin: 0 0 8px;
    }

    .auth-form-header p {
      font-size: var(--font-size-base, 14px);
      color: var(--color-text-secondary, #475569);
      margin: 0;
      line-height: 1.6;
    }

    .back-to-login {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--color-primary, #0D9488);
      text-decoration: none;
      font-size: var(--font-size-sm, 13px);
      font-weight: var(--font-weight-medium, 500);
      margin-bottom: 24px;
    }

    .back-to-login:hover {
      text-decoration: underline;
    }

    .info-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      background-color: var(--color-primary-lightest, #CCFBF1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-primary, #0D9488);
    }

    .info-icon svg {
      width: 32px;
      height: 32px;
    }

    .info-box {
      padding: 24px;
      background: var(--color-bg-secondary, #F8FAFC);
      border-radius: 12px;
      text-align: center;
      margin-bottom: 24px;
    }

    .info-box p {
      margin: 0;
      font-size: var(--font-size-base, 14px);
      color: var(--color-text-secondary, #475569);
      line-height: 1.7;
    }

    .info-box .info-title {
      font-size: 16px;
      font-weight: var(--font-weight-semibold, 600);
      color: var(--color-text-primary, #0F172A);
      margin-bottom: 12px;
    }

    .btn-submit {
      width: 100%;
      padding: 12px;
      font-size: var(--font-size-base, 14px);
      font-weight: var(--font-weight-semibold, 600);
      font-family: var(--font-family);
      color: var(--color-text-on-primary, #FFFFFF);
      background-color: var(--color-primary, #0D9488);
      border: none;
      border-radius: var(--radius-md, 8px);
      cursor: pointer;
      transition: background-color 0.15s ease;
      text-decoration: none;
      display: inline-block;
      text-align: center;
      box-sizing: border-box;
    }

    .btn-submit:hover {
      background-color: var(--color-primary-dark, #0F766E);
    }

    .auth-footer {
      text-align: center;
      font-size: var(--font-size-sm, 13px);
      color: var(--color-text-secondary, #475569);
      margin-top: 24px;
    }

    .auth-footer a {
      color: var(--color-primary, #0D9488);
      text-decoration: none;
      font-weight: var(--font-weight-medium, 500);
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .auth-container {
        flex-direction: column;
      }
      .auth-brand {
        padding: 32px 24px;
      }
      .auth-form-container {
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-brand">
      <div class="brand-logo">
        <div class="brand-logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div class="brand-logo-text">TalentFlow AI</div>
      </div>
      <h1>找回您的密码</h1>
      <p>我们将帮助您快速重置密码，重新访问账户</p>
      <div class="brand-help">
        <div class="brand-help-title">常见问题</div>
        <div class="brand-help-item">
          <div class="brand-help-icon">?</div>
          <span>忘记密码？请联系系统管理员重置</span>
        </div>
        <div class="brand-help-item">
          <div class="brand-help-icon">?</div>
          <span>管理员可在系统设置中重置任意账号密码</span>
        </div>
        <div class="brand-help-item">
          <div class="brand-help-icon">?</div>
          <span>如有其他问题，请联系客服支持</span>
        </div>
      </div>
    </div>
    <div class="auth-form-container">
      <a href="login.html" class="back-to-login">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        返回登录
      </a>
      <div class="auth-form-header">
        <h2>忘记密码</h2>
        <p>请通过管理员重置您的密码</p>
      </div>

      <div class="info-box">
        <div class="info-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="16" x2="12" y2="12"/>
            <line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
        </div>
        <p class="info-title">请联系管理员重置密码</p>
        <p>出于安全考虑，本系统不提供在线自助找回密码功能。请联系您的系统管理员，由管理员在用户管理中为您重置密码。</p>
      </div>

      <a href="login.html" class="btn-submit">返回登录</a>

      <div class="auth-footer">
        还没有账户？<a href="register.html">立即注册</a>
      </div>
    </div>
  </div>

  <script src="../shared/auth.js"></script>
  <script src="../shared/menu-config.js"></script>
  <script src="../shared/loading.js"></script>
  <script src="../shared/router.js"></script>
  <script src="../shared/api.js"></script>
</body>
</html>
